<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password — Learn With Trang</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 1rem;
    }
    .cp-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .cp-logo {
      width: 80px; height: 80px; margin-bottom: 1.25rem;
      border-radius: 50%; object-fit: cover; object-position: center top;
      border: 2px solid var(--border-d);
      box-shadow: 0 2px 8px rgba(244,114,182,0.25);
    }
    .cp-title { font-size: 1.3rem; font-weight: 700; color: var(--text); margin: 0 0 0.3rem; }
    .cp-sub   { font-size: 0.85rem; color: var(--text-muted); margin: 0 0 1.5rem; }
    .cp-field {
      display: block; width: 100%; margin-bottom: 0.6rem;
      padding: 0.5rem 0.8rem; box-sizing: border-box;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 0.92rem; font-family: inherit;
      background: var(--card-bg); color: var(--text);
      transition: border-color 0.15s;
    }
    .cp-field:focus { outline: none; border-color: var(--primary); }
    .cp-err   { color: var(--danger); font-size: 0.82rem; min-height: 1.1em; margin: 0.1rem 0 0.6rem; text-align: left; }
    .cp-ok    { color: var(--primary); font-size: 0.95rem; margin: 0 0 0.5rem; }
    .cp-back  { display: inline-block; margin-top: 1.25rem; font-size: 0.82rem; color: var(--text-muted); text-decoration: none; }
    .cp-back:hover { color: var(--primary); }
  </style>
</head>
<body>
  <div class="cp-card">
    <img src="Logo.png" alt="Learn With Trang" class="cp-logo">
    <h1 class="cp-title" id="cpTitle">Change Password</h1>
    <p  class="cp-sub"   id="cpSub">Enter your new password below.</p>

    <!-- Loading -->
    <div id="cpLoading">
      <p style="color:var(--text-muted);font-size:0.9rem;">Loading…</p>
    </div>

    <!-- Form -->
    <div id="cpForm" style="display:none;">
      <input type="password" id="cpPwd1" class="cp-field" placeholder="New password">
      <input type="password" id="cpPwd2" class="cp-field" placeholder="Confirm new password">
      <p class="cp-err" id="cpErr"></p>
      <button class="btn btn-primary" id="cpBtn" onclick="doChangePwd()" style="width:100%;">Save Password</button>
    </div>

    <!-- Success -->
    <div id="cpSuccess" style="display:none;">
      <p class="cp-ok">✓ Password updated successfully!</p>
      <p style="font-size:0.85rem;color:var(--text-muted);">Redirecting to the app…</p>
    </div>

    <!-- No valid session -->
    <div id="cpNoSession" style="display:none;">
      <p style="font-size:0.85rem;color:var(--text-muted);">
        Session expired or invalid link. Please request a new reset link from the app.
      </p>
    </div>

    <a href="app.html" class="cp-back">← Back to app</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/db.js"></script>
  <script>
    'use strict';

    const cpLoading   = document.getElementById('cpLoading');
    const cpForm      = document.getElementById('cpForm');
    const cpSuccess   = document.getElementById('cpSuccess');
    const cpNoSession = document.getElementById('cpNoSession');
    const cpErr       = document.getElementById('cpErr');
    const cpTitle     = document.getElementById('cpTitle');
    const cpSub       = document.getElementById('cpSub');

    let _ready = false;

    function showForm(isRecovery) {
      if (_ready) return;
      _ready = true;
      cpLoading.style.display = 'none';
      cpForm.style.display    = 'block';
      if (isRecovery) {
        cpTitle.textContent = 'Set New Password';
        cpSub.textContent   = 'Choose a new password for your account.';
      }
      document.getElementById('cpPwd1').focus();
    }

    function showNoSession() {
      if (_ready) return;
      _ready = true;
      cpLoading.style.display   = 'none';
      cpNoSession.style.display = 'block';
    }

    async function doChangePwd() {
      const n1  = document.getElementById('cpPwd1').value;
      const n2  = document.getElementById('cpPwd2').value;
      const btn = document.getElementById('cpBtn');
      cpErr.textContent = '';
      if (!n1 || n1 !== n2) { cpErr.textContent = 'Passwords do not match.'; return; }
      if (n1.length < 6)    { cpErr.textContent = 'Password must be at least 6 characters.'; return; }

      btn.disabled = true;
      btn.textContent = 'Saving…';
      const error = await db.updatePassword(n1);
      btn.disabled = false;
      btn.textContent = 'Save Password';

      if (error) { cpErr.textContent = error.message || 'Failed to update password. Please try again.'; return; }

      cpForm.style.display    = 'none';
      cpSuccess.style.display = 'block';
      setTimeout(() => { window.location.href = 'app.html'; }, 2000);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && cpForm.style.display !== 'none') doChangePwd();
    });

    // PASSWORD_RECOVERY fires when user arrives via a reset-email link.
    // INITIAL_SESSION / SIGNED_IN fires when the user is already logged in.
    db.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        showForm(true);
      } else if (session?.user) {
        showForm(false);
      }
    });

    // Also check for an existing session immediately (handles already-logged-in users).
    (async () => {
      const session = await db.getSession();
      if (session) { showForm(false); return; }
      // Give Supabase time to process the URL hash for recovery links.
      setTimeout(() => { if (!_ready) showNoSession(); }, 3000);
    })();
  </script>
</body>
</html>
